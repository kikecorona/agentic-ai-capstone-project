<!--
  Open-book logo — white stroke outline on transparent background.
  Sits on the dark app header; matches the rest of the retro UI's
  mono-line styling.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left page: top edge curves down to the spine, bottom edge curves out -->
  <path d="M32 18 C 24 14 14 14 6 16 L 6 50 C 14 48 24 48 32 52" />
  <!-- Right page: mirror -->
  <path d="M32 18 C 40 14 50 14 58 16 L 58 50 C 50 48 40 48 32 52" />
  <!-- Spine -->
  <line x1="32" y1="18" x2="32" y2="52" />
  <!-- Text lines, thinner stroke so they read as content, not structure -->
  <line x1="12" y1="25" x2="26" y2="24" stroke-width="1.4" />
  <line x1="12" y1="31" x2="26" y2="30" stroke-width="1.4" />
  <line x1="12" y1="37" x2="26" y2="36" stroke-width="1.4" />
  <line x1="38" y1="24" x2="52" y2="25" stroke-width="1.4" />
  <line x1="38" y1="30" x2="52" y2="31" stroke-width="1.4" />
  <line x1="38" y1="36" x2="52" y2="37" stroke-width="1.4" />
</svg>
